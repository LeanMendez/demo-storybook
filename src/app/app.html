<main class="page">
  <header class="page__header">
    <h1>{{ title() }}</h1>
    <p>Mini design system: Badge › UserCard › UserList. Cambiá el estado para ver cada variante.</p>
  </header>

  <nav class="page__toolbar" aria-label="Estado de la lista">
    @for (option of states; track option) {
      <button
        type="button"
        class="page__toggle"
        [class.page__toggle--active]="state() === option"
        [attr.aria-pressed]="state() === option"
        (click)="setState(option)"
      >
        {{ option }}
      </button>
    }
  </nav>

  <section class="page__content">
    <app-user-list
      [users]="users()"
      [loading]="loading()"
      [error]="error()"
      (userSelected)="onUserSelected($event)"
    />
  </section>

  @if (selected(); as user) {
    <section class="page__details">
      <app-user-card-details [user]="user" />
    </section>
  }
</main>
